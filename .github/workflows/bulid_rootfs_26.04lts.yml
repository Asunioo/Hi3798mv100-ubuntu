name: Build Ubuntu 26.04 ARMHF RootFS

on:
  # 当推送到 main/master 分支且修改了本工作流文件时触发
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build-rootfs.yml'
  
  # 保留手动触发作为备用
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 安装依赖并更新 debootstrap
      - name: Install Dependencies & Update Debootstrap
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static binfmt-support
          
          # 验证 resolute 脚本是否存在，不存在则报错终止
          if [ ! -f /usr/share/debootstrap/scripts/resolute ]; then
            echo "❌ Error: debootstrap does not support 'resolute' yet."
            echo "Please wait for GitHub Actions runner update or switch to noble/jammy."
            exit 1
          fi
          echo "✅ debootstrap supports 'resolute'"

      # 3. 创建 RootFS (Debootstrap 第一阶段)
      - name: Create RootFS Stage 1
        run: |
          sudo debootstrap --arch=armhf --foreign resolute ./ubuntu-resolute-armhf-rootfs http://mirrors.huaweicloud.com/ubuntu-ports/

      # 4. 复制 QEMU 模拟器 (独立步骤，防止目录不存在)
      - name: Copy QEMU Static
        run: |
          sudo cp /usr/bin/qemu-arm-static ./ubuntu-resolute-armhf-rootfs/usr/bin/

      # 5. 完成第二阶段并配置系统
      - name: Finalize System and Set Config
        run: |
          export ROOTFS_DIR="./ubuntu-resolute-armhf-rootfs"
          
          # 执行 debootstrap 第二阶段
          sudo chroot ${ROOTFS_DIR} /debootstrap/debootstrap --second-stage
          
          # 设置 APT 源 (华为云镜像)
          echo "=> Configuring APT sources..."
          cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/apt/sources.list
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ resolute main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ resolute-updates main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ resolute-security main restricted universe multiverse
          EOF
          
          # 设置主机名和 DNS
          echo "ubuntu-resolute" | sudo tee ${ROOTFS_DIR}/etc/hostname
          echo "nameserver 8.8.8.8" | sudo tee ${ROOTFS_DIR}/etc/resolv.conf
          
          # 更新软件包列表
          sudo chroot ${ROOTFS_DIR} apt-get update

      # 6. 打包 RootFS
      - name: Pack RootFS
        run: |
          DIR="./ubuntu-resolute-armhf-rootfs"
          OUTPUT="ubuntu-26.04-resolute-armhf-rootfs.tar.gz"
          
          echo "=> Packing ${OUTPUT} ..."
          sudo tar -czpf ${OUTPUT} -C ${DIR} .
          
          echo "=> Package size:"
          ls -lh ${OUTPUT}

      # 7. 上传构建产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-26.04-resolute-armhf-rootfs
          path: ubuntu-26.04-resolute-armhf-rootfs.tar.gz
          retention-days: 7
