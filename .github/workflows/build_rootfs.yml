name: Build RootFS (EXT4 Image)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static binfmt-support e2fsprogs dosfstools

      - name: Create RootFS via Debootstrap
        run: |
          # 1. 初始化下载
          sudo debootstrap --arch=armhf --foreign focal ./ubuntu-focal-armhf-rootfs http://mirrors.huaweicloud.com/ubuntu-ports/
          # 2. 复制 QEMU
          sudo cp /usr/bin/qemu-arm-static ./ubuntu-focal-armhf-rootfs/usr/bin/

      # --- 关键修改点：将配置合并到这一步，并调整顺序 ---
      - name: Finalize System and Set Config
        run: |
          export ROOTFS_DIR="./ubuntu-focal-armhf-rootfs"
          
          # 1. 首先执行 Second Stage (这会真正安装核心软件包并创建 root 用户)
          echo "=> Executing debootstrap second-stage..."
          sudo chroot ${ROOTFS_DIR} /debootstrap/debootstrap --second-stage
          
          # 2. 设置 apt 源
          echo "=> Configuring APT sources..."
          echo "deb https://mirrors.huaweicloud.com/ubuntu-ports/ focal main restricted universe multiverse" | sudo tee ${ROOTFS_DIR}/etc/apt/sources.list
          
          # 3. 现在可以安全地设置密码了 (root 用户已存在)
          echo "=> Setting root password..."
          sudo chroot ${ROOTFS_DIR} /bin/bash -c 'echo "root:123456" | chpasswd'
          
          # 4. 允许 SSH Root 登录
          echo "=> Configuring SSH..."
          sudo sed -i 's/#*PermitRootLogin.*/PermitRootLogin yes/' ${ROOTFS_DIR}/etc/ssh/sshd_config || true
          
          # 5. 注入网卡配置 (保持不变)
          echo "=> Writing network interfaces..."
          sudo tee ${ROOTFS_DIR}/etc/network/interfaces > /dev/null << 'EOF'
          auto lo
          iface lo inet loopback

          auto eth0
          iface eth0 inet dhcp
              hwaddress ether BC:25:E0:3F:F1:D9
          EOF

          # 6. 清理缓存
          sudo chroot ${ROOTFS_DIR} apt-get clean

      # --- 打包步骤 ---
      - name: Package to EXT4
        run: |
          IMAGE_NAME="hi3798mv100_rootfs.img"
          DIR="./ubuntu-focal-armhf-rootfs"
          
          # 计算大小
          SIZE=$(sudo du -sm $DIR | cut -f1)
          IMAGE_SIZE=$((SIZE + 200))
          
          # 创建镜像
          dd if=/dev/zero of=$IMAGE_NAME bs=1M count=$IMAGE_SIZE
          mkfs.ext4 -F $IMAGE_NAME
          
          # 挂载并复制
          sudo mkdir -p /mnt/temp
          sudo mount -o loop $IMAGE_NAME /mnt/temp
          sudo cp -a $DIR/. /mnt/temp/
          sudo umount /mnt/temp
          
          # 优化镜像体积
          e2fsck -f -y $IMAGE_NAME || true
          resize2fs -M $IMAGE_NAME || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-rootfs
          path: hi3798mv100_rootfs.img
