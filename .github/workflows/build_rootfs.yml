name: Build RootFS

on:
  push:
    branches: [ "main" ] # 或者你的主分支名称
  workflow_dispatch:      # 允许手动触发

jobs:
  build-rootfs:
    runs-on: ubuntu-latest # 使用 Ubuntu 最新版作为构建环境

    steps:
      # 1. 检出代码仓库 (对应截图底部的 Post Checkout)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装必要的依赖工具 (QEMU用于模拟ARM架构)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static binfmt-support

      # 3. 创建 RootFS (对应截图第一步 Create RootFS via Debootstrap)
      - name: Create RootFS via Debootstrap
        run: |
          # 注意：debootstrap 通常需要 root 权限，所以加 sudo
          # --arch=armhf 指定架构
          # focal 是 Ubuntu 20.04 的代号
          # ./ubuntu-focal-armhf-rootfs 是输出目录
          sudo debootstrap --arch=armhf --foreign focal ./ubuntu-focal-armhf-rootfs http://mirrors.huaweicloud.com/ubuntu-ports/

          # 复制 QEMU 模拟器进入目标系统，以便后续能 chroot 进去执行命令
          sudo cp /usr/bin/qemu-arm-static ./ubuntu-focal-armhf-rootfs/usr/bin/

      # 4. 配置系统和清理 (对应截图第二步 Configure System and Clean up)
      - name: Configure System and Clean up
        run: |
          export ROOTFS_DIR="./ubuntu-focal-armhf-rootfs"

          # 设置源 (参考截图中的华为云源)
          echo "deb https://mirrors.huaweicloud.com/ubuntu-ports/ focal main restricted universe multiverse" | sudo tee ${ROOTFS_DIR}/etc/apt/sources.list

          # 这里通常还需要执行 second-stage 脚本来完成安装
          # sudo chroot ${ROOTFS_DIR} /debootstrap/debootstrap --second-stage

          # 你可以在这里添加更多自定义配置命令...

      # 5. 打包 RootFS (这是你报错的地方，已修复)
      - name: Package RootFS
        run: |
          # 【关键修复】：必须使用 sudo tar，因为生成的文件系统包含大量 root 权限文件
          # 普通用户无法读取 /etc/shadow 等敏感文件，会导致 Permission denied
          sudo tar -czf hi3798mv100_ubuntu20.04_rootfs.tar.gz -C ./ubuntu-focal-armhf-rootfs .

      # 6. 上传产物 (对应截图 Upload Artifact)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi3798mv100-rootfs
          path: hi3798mv100_ubuntu20.04_rootfs.tar.gz
