name: Build Ubuntu 22.04 RootFS for Hi3798MV100

on:
workflow_dispatch:

jobs:
build-rootfs:
runs-on: ubuntu-22.04

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        debootstrap qemu-user-static binfmt-support \
        e2fsprogs dosfstools rsync curl gnupg

  - name: Create RootFS via Debootstrap
    run: |
      sudo debootstrap --arch=armhf --foreign jammy ./ubuntu-jammy-armhf-rootfs https://mirrors.huaweicloud.com/ubuntu-ports/
      sudo cp /usr/bin/qemu-arm-static ./ubuntu-jammy-armhf-rootfs/usr/bin/

  - name: Finalize System and Set Config
    run: |
      export ROOTFS_DIR="./ubuntu-jammy-armhf-rootfs"

      sudo chroot ${ROOTFS_DIR} /debootstrap/debootstrap --second-stage

      sudo mount -t proc /proc ${ROOTFS_DIR}/proc
      sudo mount -t sysfs /sys ${ROOTFS_DIR}/sys
      sudo mount -o bind /dev ${ROOTFS_DIR}/dev

      sudo chroot ${ROOTFS_DIR} apt-get update
      sudo chroot ${ROOTFS_DIR} apt-get install -y \
        systemd systemd-sysv \
        openssh-server iproute2 \
        vim nano curl wget \
        net-tools iputils-ping tcpdump \
        htop sudo lsb-release procps kmod

      # 设置 root 密码
      sudo chroot ${ROOTFS_DIR} bash -c 'echo "root:123456" | chpasswd'

      # SSH
      printf "PermitRootLogin yes\nPasswordAuthentication yes\n" | sudo tee -a ${ROOTFS_DIR}/etc/ssh/sshd_config > /dev/null

      # machine-id（关键）
      sudo chroot ${ROOTFS_DIR} systemd-machine-id-setup

      # fstab（关键）
      cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/fstab
      proc  /proc  proc  defaults  0 0
      sysfs /sys   sysfs defaults  0 0
      devpts /dev/pts devpts defaults 0 0
      tmpfs /run tmpfs defaults 0 0
      EOF

      # 串口登录
      sudo chroot ${ROOTFS_DIR} systemctl enable serial-getty@ttyAMA0

      # 网络
      sudo mkdir -p ${ROOTFS_DIR}/etc/netplan/
      cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/netplan/01-netcfg.yaml
      network:
        version: 2
        renderer: networkd
        ethernets:
          eth0:
            dhcp4: true
      EOF

      sudo chroot ${ROOTFS_DIR} systemctl enable systemd-networkd
      sudo chroot ${ROOTFS_DIR} systemctl enable systemd-resolved

      # ===== Docker 安装 =====
      sudo chroot ${ROOTFS_DIR} bash -c "
      apt-get install -y ca-certificates curl gnupg
      mkdir -p /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      echo 'deb [arch=armhf signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable' > /etc/apt/sources.list.d/docker.list
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io
      "

      # Docker 使用 cgroup v1
      sudo mkdir -p ${ROOTFS_DIR}/etc/docker
      echo '{ "exec-opts": ["native.cgroupdriver=cgroupfs"] }' | sudo tee ${ROOTFS_DIR}/etc/docker/daemon.json

      sudo chroot ${ROOTFS_DIR} systemctl enable docker

      sudo chroot ${ROOTFS_DIR} apt-get clean

      sudo umount ${ROOTFS_DIR}/proc
      sudo umount ${ROOTFS_DIR}/sys
      sudo umount ${ROOTFS_DIR}/dev

  - name: Package to EXT4
    run: |
      IMAGE_NAME="hi3798mv100_rootfs_jammy.img"
      DIR="./ubuntu-jammy-armhf-rootfs"

      SIZE=$(sudo du -sm $DIR | cut -f1)
      IMAGE_SIZE=$((SIZE + 300))

      dd if=/dev/zero of=$IMAGE_NAME bs=1M count=$IMAGE_SIZE
      mkfs.ext4 -F $IMAGE_NAME

      sudo mkdir -p /mnt/temp

      # 修复 loop 问题
      sudo modprobe loop || true
      LOOPDEV=$(sudo losetup -f)
      sudo losetup $LOOPDEV $IMAGE_NAME
      sudo mount $LOOPDEV /mnt/temp

      sudo rsync -a $DIR/ /mnt/temp/

      sudo umount /mnt/temp
      sudo losetup -d $LOOPDEV

      e2fsck -f -y $IMAGE_NAME || true
      resize2fs -M $IMAGE_NAME || true

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: ubuntu-22.04-rootfs-ext4
      path: hi3798mv100_rootfs_jammy.img
      retention-days: 7
```
