name: Build Ubuntu 22.04 RootFS cgroupe v1

on:
  workflow_dispatch: # 允许在 GitHub 页面手动触发工作流

jobs:
  build-rootfs:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码仓库
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. 安装构建所需的依赖工具
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static binfmt-support e2fsprogs dosfstools

      # 3. 创建 RootFS (Debootstrap 第一阶段)
      - name: Create RootFS via Debootstrap
        run: |
          # 下载基础系统 (armhf架构, Ubuntu 22.04 Jammy)
          sudo debootstrap --arch=armhf --foreign jammy ./ubuntu-jammy-armhf-rootfs http://mirrors.huaweicloud.com/ubuntu-ports/
          # 复制 QEMU 模拟器，以便后续 chroot 执行命令
          sudo cp /usr/bin/qemu-arm-static ./ubuntu-jammy-armhf-rootfs/usr/bin/

      # 4. 完成系统安装与核心配置（新增cgroup v1全套配置）
      - name: Finalize System and Set Config
        run: |
          export ROOTFS_DIR="./ubuntu-jammy-armhf-rootfs"
          
          # 1. 执行 Second Stage (完成基础软件包安装)
          echo "=> Executing debootstrap second-stage..."
          sudo chroot ${ROOTFS_DIR} /debootstrap/debootstrap --second-stage
          
          # 2. 挂载 proc 和 sys 并安装必要的软件包
          echo "=> Installing common tools and network utilities..."
          sudo mount -t proc /proc ${ROOTFS_DIR}/proc
          sudo mount -t sysfs /sys ${ROOTFS_DIR}/sys
          sudo chroot ${ROOTFS_DIR} apt-get update
          # 额外安装cgroup工具包
          sudo chroot ${ROOTFS_DIR} apt-get install -y \
            openssh-server iproute2 \
            vim nano curl wget \
            net-tools iputils-ping ssh tcpdump \
            htop sudo lsb-release procps \
            cgroup-tools libcgroup-dev
          sudo umount ${ROOTFS_DIR}/proc
          sudo umount ${ROOTFS_DIR}/sys

          # 3. 设置 APT 源 (华为云，包含 updates 和 security)
          echo "=> Configuring APT sources..."
          cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/apt/sources.list
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ jammy main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ jammy-updates main restricted universe multiverse
          deb https://mirrors.huaweicloud.com/ubuntu-ports/ jammy-security main restricted universe multiverse
          EOF
          
          # 4. 设置 root 默认密码为 123456
          echo "=> Setting root password..."
          sudo chroot ${ROOTFS_DIR} /bin/bash -c 'echo "root:123456" | chpasswd'
          
          # 5. 配置 SSH 允许 root 远程登录
          echo "=> Configuring SSH..."
          printf "PermitRootLogin yes\nPasswordAuthentication yes\n" | sudo tee -a ${ROOTFS_DIR}/etc/ssh/sshd_config > /dev/null
          
          # 6. 使用 Netplan 配置网卡 eth0
          echo "=> Writing Netplan network config..."
          sudo mkdir -p ${ROOTFS_DIR}/etc/netplan/
          sudo tee ${ROOTFS_DIR}/etc/netplan/01-netcfg.yaml > /dev/null << 'EOF'
          network:
            version: 2
            renderer: networkd
            ethernets:
              eth0:
                dhcp4: true
                macaddress: BC:25:E0:3F:F1:D9
          EOF

          # 7. 启用网络服务开机自启
          echo "=> Enabling network service..."
          sudo chroot ${ROOTFS_DIR} systemctl enable systemd-networkd
          sudo chroot ${ROOTFS_DIR} systemctl enable systemd-resolved

          # ========== 核心cgroup v1配置开始 ==========
          echo "=== Configure systemd to force cgroup v1 ==="
          # 1. systemd 全局强制cgroup v1
          sudo mkdir -p ${ROOTFS_DIR}/etc/systemd/system.conf.d/
          cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/systemd/system.conf.d/00-cgroup-v1.conf
          [Manager]
          DefaultControllers=cpu,cpuset,memory,io,devices,freezer,hugetlb,pids,net_cls,net_prio
          EOF

          # 2. grub内核参数（U-Boot启动传参同理，这里写入默认cmdline）
          sudo mkdir -p ${ROOTFS_DIR}/etc/default/
          cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/default/cgroup-kernel
          # 内核启动必须携带：systemd.unified_cgroup_hierarchy=0 关闭v2，启用v1
          CMDLINE_EXTRA="systemd.unified_cgroup_hierarchy=0 cgroup_enable=memory swapaccount=1"
          EOF

          # 3. 创建开机挂载脚本，自动挂载全部cgroup v1子系统
          sudo tee ${ROOTFS_DIR}/etc/systemd/system/mount-cgroupv1.service > /dev/null << 'EOF'
          [Unit]
          Description=Mount CGroup V1 Subsystems
          After=sysfs.target local-fs.target

          [Service]
          Type=oneshot
          ExecStart=/bin/bash -c '
          mkdir -p /sys/fs/cgroup
          # 标准v1子系统列表
          subsystems=(cpu cpuset memory io devices freezer hugetlb pids net_cls net_prio)
          for sub in "${subsystems[@]}"; do
            mkdir -p /sys/fs/cgroup/$sub
            mount -t cgroup -o $sub cgroup /sys/fs/cgroup/$sub
          done
          # 兼容libcgroup统一挂载点
          mkdir -p /cgroup
          mount -t tmpfs tmpfs /cgroup
          for sub in "${subsystems[@]}"; do
            mkdir -p /cgroup/$sub
            mount --bind /sys/fs/cgroup/$sub /cgroup/$sub
          done
          '
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          EOF

          # 4. 启用cgroup挂载服务开机自启
          sudo chroot ${ROOTFS_DIR} systemctl daemon-reload
          sudo chroot ${ROOTFS_DIR} systemctl enable mount-cgroupv1.service

          # 5. libcgroup默认配置适配v1
          cat << 'EOF' | sudo tee ${ROOTFS_DIR}/etc/cgconfig.conf
          mount {
            cpuset  = /sys/fs/cgroup/cpuset;
            cpu     = /sys/fs/cgroup/cpu;
            cpuacct = /sys/fs/cgroup/cpuacct;
            memory  = /sys/fs/cgroup/memory;
            devices = /sys/fs/cgroup/devices;
            freezer = /sys/fs/cgroup/freezer;
            net_cls = /sys/fs/cgroup/net_cls;
            net_prio= /sys/fs/cgroup/net_prio;
            io      = /sys/fs/cgroup/io;
            pids    = /sys/fs/cgroup/pids;
            hugetlb = /sys/fs/cgroup/hugetlb;
          }
          EOF
          sudo chroot ${ROOTFS_DIR} systemctl enable cgconfig.service
          # ========== 核心cgroup v1配置结束 ==========

          # 8. 清理 apt 缓存，减小镜像体积
          sudo chroot ${ROOTFS_DIR} apt-get clean

      # 5. 打包为 EXT4 镜像
      - name: Package to EXT4
        run: |
          IMAGE_NAME="hi3798mv100_rootfs_jammy.img"
          DIR="./ubuntu-jammy-armhf-rootfs"
          
          # 动态计算文件夹大小并预留 200MB 空间
          SIZE=$(sudo du -sm $DIR | cut -f1)
          IMAGE_SIZE=$((SIZE + 200))
          echo "Folder size: ${SIZE}MB, Creating image with size: ${IMAGE_SIZE}MB"
          
          # 创建空镜像文件
          dd if=/dev/zero of=$IMAGE_NAME bs=1M count=$IMAGE_SIZE status=progress
          # 格式化为 ext4
          mkfs.ext4 -F $IMAGE_NAME
          
          # 挂载并复制文件系统内容
          sudo mkdir -p /mnt/temp
          sudo mount -o loop $IMAGE_NAME /mnt/temp
          sudo cp -a $DIR/. /mnt/temp/
          sudo umount /mnt/temp
          
          # 检查文件系统并压缩镜像到最小体积
          e2fsck -f -y $IMAGE_NAME || true
          resize2fs -M $IMAGE_NAME || true

      # 6. 上传生成的镜像产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-22.04-rootfs-ext4
          path: hi3798mv100_rootfs_jammy.img
          retention-days: 7
